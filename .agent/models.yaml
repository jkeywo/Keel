# Model router configuration (see Spec/04-RuntimeSpec.md §5.10–5.11).
# `skills` are model competencies (planner, coder, reviewer, summariser) —
# distinct from capabilities, which are tool permissions.
models:
  # Subscription CLIs (vendor-supported headless interfaces; see Spec/00 §3.5).
  # Unavailable (no binary / no auth / usage-limit cooldown) falls through to local.
  subscription:claude-sonnet:
    provider: claude_code
    model: sonnet
    unlimited: true
    skills: [planner, reviewer, coder]

  subscription:codex:
    provider: codex_cli
    unlimited: true
    skills: [planner, coder]

  local:qwen-coder:
    provider: ollama
    model: qwen3.6-coder:latest
    context_window: 32768
    safe_prompt_budget: 24000
    reserved_output_budget: 4000
    skills: [coder, planner, summariser]

  local:qwen-large:
    provider: ollama
    model: qwen3.6:27b
    context_window: 32768
    safe_prompt_budget: 24000
    reserved_output_budget: 4000
    skills: [planner, reviewer]

  local:llama3:
    provider: ollama
    model: llama3:8b
    context_window: 8192
    safe_prompt_budget: 6000
    reserved_output_budget: 1500
    skills: [summariser]

  # Last-resort canned provider so the loop stays demonstrable offline.
  # Remove from routing once local routing is proven.
  mock:default:
    provider: mock
    unlimited: true
    skills: [planner, coder, reviewer, summariser]

# Subscription first for planning and review; local first for summarising.
routing:
  planner: [subscription:claude-sonnet, subscription:codex, local:qwen-large, local:qwen-coder, mock:default]
  coder: [subscription:claude-sonnet, local:qwen-coder, mock:default]
  reviewer: [subscription:claude-sonnet, local:qwen-large, mock:default]
  summariser: [local:llama3, local:qwen-coder, mock:default]
