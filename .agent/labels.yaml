# Canonical label configuration (see Spec/06-RepositorySpec.md, Label Conventions).
labels:
  - name: "type:feature"
    color: "1d76db"
    description: "A feature request"
  - name: "type:bug"
    color: "d73a4a"
    description: "A bug report"
  - name: "state:needs-grilling"
    color: "fbca04"
    description: "Waiting for clarifying questions to be answered"
  - name: "state:prd-draft"
    color: "fbca04"
    description: "PRD is being drafted"
  - name: "state:needs-human"
    color: "e99695"
    description: "Paused awaiting human input"
  - name: "state:ready-for-work"
    color: "0e8a16"
    description: "Ready for implementation tasks"
  - name: "state:agent-working"
    color: "5319e7"
    description: "An agent is currently processing this issue"
  - name: "state:blocked"
    color: "b60205"
    description: "Cannot proceed automatically"
  - name: "state:pr-open"
    color: "0052cc"
    description: "Implementation PR has been opened"
  - name: "state:ci-failed"
    color: "b60205"
    description: "Tests or linting failed in CI"
  - name: "state:human-review"
    color: "0052cc"
    description: "Awaiting human code review"
  - name: "state:done"
    color: "c2e0c6"
    description: "Completed and merged"
  - name: "mission:keel-bootstrap"
    color: "bfdadc"
    description: "Keel Bootstrap mission"
